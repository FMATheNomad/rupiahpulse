services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rupiahpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rupiahpulse
      CORS_ORIGINS: http://localhost:5173
      LOG_LEVEL: DEBUG
      DATA_PROVIDER_TIMEOUT_SECONDS: "15"
      GDELT_QUERY: indonesia rupiah
      CACHE_TTL_SECONDS_EXPLANATION: "300"
      CACHE_TTL_SECONDS_NEWS: "600"
    depends_on:
      - postgres

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rupiahpulse
      CORS_ORIGINS: http://localhost:5173
      LOG_LEVEL: DEBUG
      DATA_PROVIDER_TIMEOUT_SECONDS: "15"
      GDELT_QUERY: indonesia rupiah
      CACHE_TTL_SECONDS_EXPLANATION: "300"
      CACHE_TTL_SECONDS_NEWS: "600"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
