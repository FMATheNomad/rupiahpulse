version: "3"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rupiahpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/rupiahpulse}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DATA_PROVIDER_TIMEOUT_SECONDS: "15"
      GDELT_QUERY: indonesia rupiah
      CACHE_TTL_SECONDS_EXPLANATION: "300"
      CACHE_TTL_SECONDS_NEWS: "600"
    depends_on:
      - postgres
    networks:
      - frontend
      - backend
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/rupiahpulse}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DATA_PROVIDER_TIMEOUT_SECONDS: "15"
      GDELT_QUERY: indonesia rupiah
      CACHE_TTL_SECONDS_EXPLANATION: "300"
      CACHE_TTL_SECONDS_NEWS: "600"
    depends_on:
      - postgres
    networks:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend
    restart: unless-stopped

volumes:
  pgdata:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
